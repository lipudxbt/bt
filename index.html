<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>记忆队模拟器</title>
    <style>
:root {
    --bg-deep: #0a0e15; --bg-panel: rgba(14, 18, 28, 0.85); --bg-card: rgba(18, 24, 38, 0.75);
    --bg-input: rgba(20, 28, 44, 0.8); --border-dim: rgba(255, 255, 255, 0.06);
    --text-primary: #e2e6f0; --text-secondary: #8899bb; --accent-ice: #6ec6f8;
    --accent-wind: #5fe6a0; --accent-gold: #f0c060; --accent-pink: #f06090;
    --radius-lg: 14px; --radius-md: 10px; --radius-sm: 7px;
    --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: radial-gradient(ellipse at 30% 20%, #131a2c 0%, #0a0e15 70%);
    color: var(--text-primary); font-family: 'Segoe UI', 'Inter', 'Microsoft YaHei', sans-serif;
    padding: 8px; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
}
#app {
    max-width: 1200px; width: 100%; background: var(--bg-panel); backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px); border-radius: var(--radius-lg); padding: 12px;
    border: 1px solid var(--border-dim); box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
}
.header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--border-dim); flex-wrap: wrap; gap: 6px; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; background: linear-gradient(135deg, #c0d8ff, #8098ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.btn { background: rgba(30, 40, 60, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text-primary); padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; transition: all var(--transition-fast); backdrop-filter: blur(6px); letter-spacing: 0.3px; }
.btn:hover { background: rgba(50, 65, 90, 0.8); border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 0 10px rgba(100, 140, 220, 0.2); transform: translateY(-1px); }
.btn-primary { background: linear-gradient(135deg, #3a5a8c, #4a6fa5); border-color: rgba(100, 150, 220, 0.4); }
.btn-primary:hover { background: linear-gradient(135deg, #4a6fa5, #5a8ac0); box-shadow: 0 0 16px rgba(100, 160, 240, 0.35); }
.btn-danger { background: linear-gradient(135deg, #6a2a2a, #8a3a3a); border-color: rgba(200, 80, 80, 0.4); }
.btn-danger:hover { background: linear-gradient(135deg, #8a3a3a, #a04a4a); box-shadow: 0 0 16px rgba(220, 80, 80, 0.4); }
.btn-warning { background: linear-gradient(135deg, #6a5a1a, #8a7a2a); border-color: rgba(200, 180, 80, 0.4); }
.btn-warning:hover { background: linear-gradient(135deg, #8a7a2a, #a09040); box-shadow: 0 0 16px rgba(220, 180, 60, 0.4); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(40%); box-shadow: none; }
.settings-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; background: var(--bg-card); padding: 6px 12px; border-radius: var(--radius-md); border: 1px solid var(--border-dim); }
.settings-row label { color: var(--text-secondary); font-size: 11px; font-weight: 500; }
.settings-row select { background: var(--bg-input); color: var(--text-primary); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 11px; cursor: pointer; outline: none; }
.action-bar { background: var(--bg-card); border-radius: var(--radius-md); padding: 8px 12px; margin-bottom: 10px; border: 1px solid var(--border-dim); min-height: 38px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; overflow-x: auto; }
.action-bar .label { font-size: 11px; color: var(--text-secondary); margin-right: 4px; font-weight: 600; }
.action-slot { background: rgba(20, 28, 42, 0.8); padding: 3px 8px; border-radius: 16px; font-size: 10px; border: 1px solid rgba(255, 255, 255, 0.06); display: flex; align-items: center; gap: 3px; white-space: nowrap; flex-shrink: 0; }
.action-slot.current { border-color: var(--accent-gold); background: rgba(40, 50, 30, 0.6); box-shadow: 0 0 12px rgba(240, 192, 96, 0.25); font-weight: 600; }
.action-slot.extra { border-color: rgba(120, 160, 255, 0.5); background: rgba(25, 35, 60, 0.7); }
.action-slot .avatar { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; background: rgba(40, 50, 70, 0.8); font-size: 10px; font-weight: 700; }
.enemy-bar { background: var(--bg-card); border-radius: var(--radius-md); padding: 6px 12px; margin-bottom: 10px; border: 1px solid var(--border-dim); display: flex; flex-wrap: wrap; gap: 8px 12px; }
.enemy-bar .enemy-item { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 90px; padding: 4px 6px; background: rgba(10, 16, 24, 0.8); border-radius: var(--radius-sm); border: 1px solid rgba(255, 255, 255, 0.05); }
.enemy-bar .enemy-item .name { font-size: 11px; font-weight: 600; display: flex; justify-content: space-between; width: 100%; }
.enemy-bar .enemy-item .name .tag { font-size: 8px; font-weight: 600; padding: 1px 6px; border-radius: 10px; }
.enemy-bar .enemy-item .hp-track { width: 100%; height: 8px; background: rgba(20, 30, 40, 0.8); border-radius: 6px; overflow: hidden; position: relative; }
.enemy-bar .enemy-item .hp-track .fill { height: 100%; background: linear-gradient(90deg, #d03030, #f05040); border-radius: 6px; transition: width 0.4s; }
.enemy-bar .enemy-item .hp-track .label { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #fff; font-weight: 700; }
.enemy-bar .enemy-item .hp-text { font-size: 9px; color: #ff9078; text-align: right; width: 100%; }
/* ★ 电脑端四列，手机端两列 ★ */
.team-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
.char-card { background: var(--bg-card); border-radius: var(--radius-md); padding: 8px; border: 2px solid var(--border-dim); position: relative; transition: all var(--transition-fast); cursor: pointer; }
.char-card:hover { border-color: rgba(255, 255, 255, 0.12); }
.char-card.active-turn { border-color: var(--accent-gold) !important; background: rgba(40, 35, 20, 0.85) !important; box-shadow: 0 0 20px rgba(240, 192, 96, 0.4); animation: pulse-card 1.5s infinite; }
@keyframes pulse-card { 0%, 100% { box-shadow: 0 0 20px rgba(240, 192, 96, 0.4); } 50% { box-shadow: 0 0 30px rgba(240, 192, 96, 0.6); } }
.char-card .char-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.char-card .stats { display: flex; flex-wrap: wrap; gap: 2px 6px; font-size: 9px; color: #aabbdd; }
.char-card .stats span { background: rgba(20, 28, 44, 0.6); padding: 2px 5px; border-radius: 5px; }
.char-card .hp-bar, .char-card .energy-bar { height: 4px; background: rgba(20, 28, 40, 0.8); border-radius: 4px; margin-top: 2px; overflow: hidden; }
.char-card .hp-bar .fill { height: 100%; background: linear-gradient(90deg, #e05040, #f08060); border-radius: 4px; transition: width 0.4s; }
.char-card .energy-bar .fill { height: 100%; background: linear-gradient(90deg, #4a7ac0, #7aaaf0); border-radius: 4px; transition: width 0.4s; }
.char-card .ult-badge { position: absolute; top: 4px; right: 4px; background: radial-gradient(circle at 30% 30%, #ffe080, #d0a020); color: #0a0e15; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 14px; opacity: 0; cursor: pointer; border: none; transition: opacity 0.3s; min-width: 36px; text-align: center; z-index: 5; }
.char-card .ult-badge.active { opacity: 1; animation: pulse-gold 2s infinite; }
@keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 8px rgba(240, 192, 96, 0.4); } 50% { box-shadow: 0 0 16px rgba(240, 192, 96, 0.7); } }
.char-card .buff-list { font-size: 7px; color: #aabbdd; margin-top: 2px; display: flex; flex-wrap: wrap; gap: 2px; }
.char-card .buff-list .buff-tag { background: rgba(30, 40, 60, 0.6); padding: 1px 5px; border-radius: 3px; border-left: 2px solid var(--accent-ice); }
.char-card .empty-slot { color: #3a4458; font-size: 12px; text-align: center; padding: 16px 0; font-weight: 500; }
.char-card .dead { color: #ff6b6b; font-weight: 700; font-size: 11px; }
.char-card .spirit-info { font-size: 9px; color: #7aa9ff; background: rgba(30, 40, 60, 0.3); padding: 1px 6px; border-radius: 4px; display: inline-block; }
.active-turn-tag { display: none; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #f0c060, #d09020); color: #0a0e15; font-size: 9px; font-weight: 700; padding: 2px 10px; border-radius: 10px; }
.char-card.active-turn .active-turn-tag { display: block; }
.char-card .corner-tag { position: absolute; bottom: 4px; right: 4px; font-size: 8px; color: var(--text-secondary); background: rgba(255,255,255,0.04); padding: 1px 4px; border-radius: 8px; }
.control-area { background: var(--bg-card); border-radius: var(--radius-md); padding: 8px 12px; border: 1px solid var(--border-dim); margin-bottom: 8px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.control-area .skill-buttons { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.control-area .skill-buttons .btn { min-width: 40px; font-size: 11px; padding: 4px 10px; }
.current-actor-indicator { background: linear-gradient(135deg, rgba(240,192,96,0.2), rgba(240,160,40,0.1)); border: 1px solid rgba(240,192,96,0.5); border-radius: 16px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--accent-gold); display: inline-flex; align-items: center; gap: 4px; animation: pulse-current 1.5s infinite; }
@keyframes pulse-current { 0%, 100% { box-shadow: 0 0 12px rgba(240, 192, 96, 0.4); } 50% { box-shadow: 0 0 20px rgba(240, 192, 96, 0.7); } }
.control-area .info-badge { font-size: 11px; color: var(--text-secondary); margin-left: auto; display: flex; gap: 10px; align-items: center; }
.control-area .info-badge .sp { color: var(--accent-gold); font-weight: 700; }
.main-row { display: flex; gap: 10px; flex-wrap: wrap; }
.main-row .left { flex: 2; min-width: 240px; }
.main-row .right { flex: 1; min-width: 180px; max-height: 320px; overflow-y: auto; background: var(--bg-card); border-radius: var(--radius-md); padding: 8px 10px; border: 1px solid var(--border-dim); font-size: 10px; line-height: 1.4; }
.main-row .right .log-entry { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 2px 0; }
.main-row .right .log-entry .time { color: #4a6080; font-size: 8px; margin-right: 4px; }
.main-row .right .log-entry .dmg-ice { color: #6ec6f8; } .main-row .right .log-entry .dmg-wind { color: #5fe6a0; }
.main-row .right .log-entry .dmg-true { color: #f06090; } .main-row .right .log-entry .dmg-enemy { color: #ff4d4d; font-weight: 600; }
.main-row .right .log-entry .heal { color: #5fdca0; } .main-row .right .log-entry .buff { color: #8899dd; }
.main-row .right .log-entry .special { color: #f0c060; } .main-row .right .log-entry .skill-use { color: #fff; font-weight: 600; background: rgba(240,192,96,0.15); padding: 1px 4px; border-radius: 3px; }
.main-row .right .log-entry .turn-start { color: #f0c060; font-weight: 700; font-size: 10px; text-align: center; display: block; border-top: 1px solid rgba(240,192,96,0.3); border-bottom: 1px solid rgba(240,192,96,0.3); padding: 3px 0; margin: 2px 0; }
.roster-panel { background: var(--bg-card); border-radius: var(--radius-md); padding: 6px 10px; border: 1px solid var(--border-dim); margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.roster-panel .roster-item { background: rgba(20, 28, 44, 0.7); padding: 2px 8px; border-radius: 14px; font-size: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.06); transition: all var(--transition-fast); display: flex; align-items: center; gap: 3px; }
.roster-panel .roster-item:hover { background: rgba(35, 48, 70, 0.8); border-color: rgba(120, 160, 255, 0.3); }
.roster-panel .roster-item.in-team { opacity: 0.4; cursor: not-allowed; }
.roster-panel .roster-item .del { color: #bb6666; cursor: pointer; font-weight: 700; } .roster-panel .roster-item .del:hover { color: #ff6666; }
.dmg-stats { background: var(--bg-card); border-radius: var(--radius-md); padding: 6px 10px; border: 1px solid var(--border-dim); margin-bottom: 8px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px 10px; }
.dmg-stats .total { color: var(--accent-gold); font-weight: 700; font-size: 12px; }
.dmg-stats .row { display: flex; flex-wrap: wrap; gap: 3px 8px; font-size: 10px; color: #aabbdd; }
.dmg-stats .row .item { background: rgba(20, 28, 44, 0.6); padding: 1px 6px; border-radius: 4px; border-left: 2px solid #4a6fa5; }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #141a24; border: 2px solid var(--accent-gold); border-radius: var(--radius-lg); padding: 16px; max-width: 450px; width: 90%; max-height: 70vh; overflow-y: auto; box-shadow: 0 0 30px rgba(240,192,96,0.3); }
.modal h2 { font-size: 16px; color: var(--accent-gold); margin-bottom: 10px; }
.modal .detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
.modal .detail-row .label { color: var(--text-secondary); }
.modal .detail-row .value { color: var(--text-primary); font-weight: 600; }
.modal .section-title { color: var(--accent-ice); font-size: 12px; font-weight: 600; margin-top: 12px; margin-bottom: 4px; }
.modal .lc-toggle { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); }
.modal .lc-toggle label { color: var(--text-primary); font-size: 12px; }
.modal .lc-toggle input { transform: scale(1.2); margin-right: 4px; }
.modal .close-btn { margin-top: 12px; float: right; }
.modal .switch-btn { background: rgba(30, 40, 60, 0.7); border: 1px solid rgba(255, 255, 255, 0.15); color: var(--text-primary); padding: 5px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; margin-top: 12px; }

.pre-battle .enemy-bar, .pre-battle .action-bar, .pre-battle .control-area, .pre-battle .dmg-stats, .pre-battle .header .round-info { display: none; }
.in-battle .roster-panel, .in-battle .settings-row { display: none; }

@media (max-width: 900px) {
    .team-panel { grid-template-columns: repeat(2, 1fr); }
    body { padding: 4px; }
    #app { padding: 8px; border-radius: 10px; }
    .header h1 { font-size: 16px; }
    .btn { padding: 4px 10px; font-size: 11px; }
    .main-row .right { max-height: 240px; font-size: 9px; }
    .action-slot { font-size: 9px; padding: 2px 6px; }
    .action-bar { padding: 6px 8px; }
    .control-area { padding: 6px 10px; }
    .dmg-stats { padding: 5px 8px; }
    .dmg-stats .total { font-size: 11px; }
    .dmg-stats .row { font-size: 9px; }
}

@media (max-width: 500px) {
    .team-panel { grid-template-columns: 1fr 1fr; gap: 4px; }
    .header h1 { font-size: 14px; }
    .btn { padding: 3px 8px; font-size: 10px; }
    .char-card { padding: 5px; }
    .char-card .char-name { font-size: 11px; }
    .char-card .stats { font-size: 8px; gap: 1px 4px; }
    .char-card .stats span { padding: 1px 4px; }
    .char-card .ult-badge { font-size: 9px; padding: 3px 7px; min-width: 28px; }
    .main-row .right { max-height: 180px; }
    .action-slot { font-size: 8px; padding: 2px 5px; }
    .action-slot .avatar { width: 14px; height: 14px; font-size: 8px; }
}
</style>
</head>
<body>
<div id="app" class="pre-battle">
    <div class="header">
        <h1>✦ 记忆队模拟器</h1>
        <div>
            <span class="round-info" style="color:#8899bb;font-size:12px;margin-right:8px;">轮次: <strong id="roundDisplay">0</strong></span>
            <button class="btn btn-primary" onclick="startBattle()">▶ 开始</button>
            <button class="btn btn-danger" onclick="resetBattle()">⟳ 重置</button>
        </div>
    </div>
    <div class="roster-panel" id="rosterPanel"></div>
    <div class="settings-row" id="settingsRow">
        <label>3.0的混沌12层怪自己打:</label>
        <select id="enemyCountSelect">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option>
        </select>
        <span style="color:#667799;font-size:11px;">(95级)</span>
    </div>
    <div class="action-bar" id="actionBar"><span class="label">⏳ 行动值</span></div>
    <div class="enemy-bar" id="enemyBar"></div>
    <div class="main-row">
        <div class="left">
            <div class="team-panel" id="teamPanel"></div>
            <div class="dmg-stats" id="dmgStats"><span class="total">📊 总伤害: <span id="totalDmgDisplay">0</span></span><div class="row" id="dmgBreakdown"></div></div>
            <div class="control-area" id="controlArea">
                <div class="skill-buttons" id="skillButtons"><span style="color:#667799;">等待行动...</span></div>
                <div class="info-badge"><span>⚡ 战技点: <span class="sp" id="spDisplay">3</span>/5</span><span>🎯 目标: <span id="targetDisplay">无</span></span></div>
            </div>
        </div>
        <div class="right" id="logPanel">
            <div style="font-weight:600;color:#8899bb;margin-bottom:4px;">📜 战斗日志</div>
            <div id="logContent"><div class="log-entry"><span class="time">[系统]</span> 编队后点击「开始战斗」</div></div>
        </div>
    </div>
</div>
<div class="modal-overlay" id="charDetailOverlay">
    <div class="modal" id="charDetailModal"></div>
</div>















<script>
let G = {
    team: [null, null, null, null], fighters: [], enemies: [],
    battleActive: false, battleStarted: false, round: 0, roundMaxAV: 300, roundStartAV: 0,
    sp: 3, maxSp: 5, actionQueue: [], currentActionIdx: 0, log: [], fieldEffects: {}, extraTurns: [],
    lastAttackTarget: null, processing: false, isUltInterrupt: false, isSpiritTurn: false,
    damageStats: { total: 0, bySource: {} },
    qinggeTalentStacks: 0, xilianInPastRipple: false, xilianIsFirstUlt: true,
    xilianStory: 0, xilianSkyStacks: 0,
    fengjinCumulativeHeal: 0, fengjinInRain: false, fengjinRainDuration: 0,
    fengjinIsFirstSummon: true, fengjinSpiritDmgStacks: 0, fengjinLightConeDrainTotal: 0,
    changyeInDarkMystery: false, changyeDarkMysteryCharges: 0, changyeWaterImmediateReady: true,
    lastActorName: null, waterScheduled: false,
    pendingUlts: [], ultSelecting: {},
    ultHpApplied: { qingge: false, fengjin: false }
};
function getAliveEnemies() { return G.enemies.filter(e => e.alive); }
function getAliveAllies() { return G.fighters.filter(f => f.alive); }
function getAllyById(id) { return G.fighters.find(f => f.charId === id); }
function getEnemyById(id) { return G.enemies.find(e => e.id === id); }
function getRandomAliveEnemy() { const a = getAliveEnemies(); return a.length ? a[Math.floor(Math.random() * a.length)] : null; }
function getCurrentFighter() { if (!G.actionQueue.length || G.currentActionIdx >= G.actionQueue.length) return null; const e = G.actionQueue[G.currentActionIdx]; if (!e || e.type === 'enemy') return null; const f = G.fighters.find(f => f.charId === e.charId); return (f && f.alive) ? f : null; }
function addLog(type, text, cls = '') { G.log.push({ time: new Date().toLocaleTimeString(), text, type: cls }); if (G.log.length > 200) G.log.shift(); renderLog(); }
function calcActionValue(spd) { return 10000 / spd; }
function getEnergyRechargeBonus() { const q = getAllyById('qingge'); return (q && q.alive && q.spirit && q.spirit.alive) ? 0.10 : 0; }
function recordDamage(src, amt) { if (!src || amt <= 0) return; G.damageStats.total += amt; G.damageStats.bySource[src] = (G.damageStats.bySource[src] || 0) + amt; renderDamageStats(); }
function renderDamageStats() { const t = G.damageStats.total; document.getElementById('totalDmgDisplay').textContent = t.toLocaleString(); const c = document.getElementById('dmgBreakdown'); const s = Object.entries(G.damageStats.bySource).sort((a, b) => b[1] - a[1]); let h = ''; s.forEach(([n, d]) => { const p = t > 0 ? (d / t * 100) : 0; h += `<span class="item">${n}: ${d.toLocaleString()} <span style="color:#ffd966;">${p.toFixed(1)}%</span></span>`; }); c.innerHTML = h || '<span style="color:#667799;">暂无伤害数据</span>'; }
function resetDamageStats() { G.damageStats = { total: 0, bySource: {} }; renderDamageStats(); }
function getDamageColor(el) { return el === '冰' ? 'dmg-ice' : el === '风' ? 'dmg-wind' : ''; }
// ============================================================
// 角色基础面板（本体属性，不含光锥）
// ============================================================
const BASE_STATS = {
    qingge:  { baseHp: 1536, baseAtk: 388, baseDef: 582, baseSpd: 172, baseCritRate: 0.05, baseCritDmg: 0.50 },

// 字段说明：
// hp     = 最大生命值
// def    = 防御力（用于减伤公式）
// spd    = 速度（决定行动值间隔）
// resist = 属性抗性（0=无抗性）
// type   = 'elite'精英怪 / 'normal'小怪（影响UI标签颜色）
// ============================================================
// 伤害计算公式（仿崩铁标准公式）
// ============================================================
function calcDamage(attacker, defender, baseDmg, element, sourceLabel, isSpirit = false) {
    // 1. 防御区：防御减伤
    const def = defender.def || 900;                           // 敌人防御，默认900
    const defMulti = 1 - def / (def + 1000);                  // 标准公式：1 - def/(def+1000)

    // 2. 抗性区：属性抗性 + 穿透
    let resist = defender.resist || 0;                        // 基础抗性
    if (element !== '风' && element !== '冰') resist += 0.2;  // 非风非冰属性有20%通用抗性
    const xl = getAllyById('xilian');
    if (xl && xl.alive && xl.spd >= 180 && (element === '冰')) {
        resist -= Math.min(xl.spd - 180, 60) * 0.02;         // 昔涟行迹3：冰抗穿透
    }
    if (G.fieldEffects.qinggeLC) resist -= 0.12;              // 晴歌光锥：全属性穿透12%
    const resistMulti = 1 - resist;                           // 抗性乘区

    // 3. 增伤区：各种伤害加成叠加
    let dmgBonus = 1;
    if (G.fieldEffects.qinggeUlt) dmgBonus += 0.60;           // 晴歌终结技 +60%
    if (G.fieldEffects.xilianField) dmgBonus += 0.20;          // 昔涟结界 +20%
    if (G.fieldEffects.xilianUlt) dmgBonus += 0.50;            // 昔涟终结技 +50%
    const qg = getAllyById('qingge');
    if (qg && qg.alive && qg.spd >= 170) dmgBonus += 0.40;    // 晴歌速度≥170 +40%
    if (xl && xl.alive && xl.spd >= 180) dmgBonus += 0.20;    // 昔涟速度≥180 +20%
    if (attacker.charId === 'changye' && G.changyeInDarkMystery) dmgBonus += 0.60;  // 至暗之谜长夜月+60%
    if (isSpirit && attacker.charId === 'changye' && G.changyeInDarkMystery) dmgBonus += 0.60; // 至暗之谜水母+60%
    const cy = getAllyById('changye');
    if (cy && cy.alive && cy.spirit && cy.spirit.alive && (attacker.charId === 'changye' || (isSpirit && attacker.charId === 'changye'))) dmgBonus += 0.50; // 水母在场+50%

    // 4. 暴击区：暴击率 + 暴击伤害
    let cr = attacker.critRate || 0.05;                       // 默认5%暴击率
    let cd = attacker.critDmg || 0.50;                        // 默认50%暴伤
    if (attacker.charId === 'fengjin' || (isSpirit && attacker.charId === 'fengjin')) cr = Math.min(cr + 1.0, 1.0); // 风堇暴击率+100%
    if (G.fieldEffects.xilianUlt) cr = Math.min(cr + 0.50, 1.0); // 昔涟终结技 +50%暴击率
    if (attacker.charId === 'qingge' || (isSpirit && attacker.charId === 'qingge')) {
        if (qg && qg.alive && qg.spd >= 170) cr = Math.min(cr + 0.30, 1.0); // 晴歌速度≥170 +30%暴击率
    }
    if (attacker.charId === 'changye' || (isSpirit && attacker.charId === 'changye')) cr = Math.min(cr + 0.35, 1.0); // 长夜月行迹2 +35%暴击率
    // 长夜月战技暴伤加成（对忆灵）
    if (isSpirit && attacker.charId === 'changye') {
        const changye = getAllyById('changye');
        if (changye && changye.alive && changye.buffs && changye.buffs.changyeSkill && changye.buffs.changyeSkill.critDmgBonus) {
            cd += changye.buffs.changyeSkill.critDmgBonus;    // 添加战技提供的暴伤
        }
    }
    if (G.fieldEffects.xilianPoem) cd += 0.16;                 // 昔涟光锥诗行 +16%暴伤
    if (G.fieldEffects.xilianBlank && G.fieldEffects.xilianPoem) cd += 0.16 * 0.60; // 同时持有效果+60%
    if ((attacker.charId === 'changye' || (isSpirit && attacker.charId === 'changye')) && G.fieldEffects.changyeTalentCD) cd += 0.60; // 天赋暴伤+60%
    if ((attacker.charId === 'changye' || (isSpirit && attacker.charId === 'changye')) && G.fieldEffects.changyeTrace2CD) cd += 0.15; // 行迹2暴伤+15%
    if ((attacker.charId === 'changye' || (isSpirit && attacker.charId === 'changye')) && G.fieldEffects.xilianMoonBuff) cd += (G.fieldEffects.changyeBaseCritDmg || 0.50) * 0.12; // 献予岁月之诗暴伤+12%

    const isCrit = Math.random() < cr;                        // 判定是否暴击
    const critMulti = isCrit ? (1 + cd) : 1;                  // 暴击乘区

    // 5. 基础伤害 = 倍率 × 防御区 × 抗性区 × 增伤区 × 暴击区
    let finalDmg = baseDmg * defMulti * resistMulti * dmgBonus * critMulti;

    // 6. 易伤区（独立乘区）
    if (G.fieldEffects.changyeUlt) finalDmg *= 1.30;          // 至暗之谜敌方受伤+30%
    if (G.fieldEffects.xilianBlank) finalDmg *= 1.10;          // 昔涟光锥空白 +10%

    // 7. 防御无视（晴歌光锥：忆灵无视20%防御）
    if (isSpirit && G.fieldEffects.qinggeLC) {
        finalDmg = finalDmg / (1 - def / (def + 1000)) * (1 - def * 0.8 / (def * 0.8 + 1000));
    }

    finalDmg = Math.round(finalDmg);                          // 四舍五入

    // 8. 真实伤害
    let tQ = 0, tX = 0;
    const first = G.fighters[0];                              // 编队第1位
    if (first && first.alive && (attacker.charId === first.charId || (isSpirit && attacker.charId === first.charId))) {
        let rate = 0.20;                                      // 基础20%真伤
        const fcd = CHAR_DATA[first.charId];
        if (fcd) {
            const me = fcd.maxEnergy || 0;
            if (me > 140) rate += Math.min(me - 140, 40) / 100; // 晴歌额外能力2：每超1点+1%
        }
        tQ = Math.round(finalDmg * rate);                     // 晴歌真伤
    }
    if (G.fieldEffects.xilianField) tX = Math.round(finalDmg * 0.24); // 昔涟结界24%真伤
    finalDmg += tQ + tX;                                      // 真伤并入总伤害

    if (sourceLabel && finalDmg > 0) recordDamage(sourceLabel, finalDmg);
    return { finalDmg, trueDmgQingge: tQ, trueDmgXilian: tX };
}

// 构建行动队列（角色 + 忆灵 + 敌人 + 额外回合）
function buildActionQueue() {
    const u = [];
    // 角色及其忆灵
    G.fighters.forEach(f => {
        if (!f.alive) return;
        u.push({ type: 'ally', charId: f.charId, name: f.name, avatar: f.avatar, spd: f.spd, av: f.av || calcActionValue(f.spd), fighter: f, isSpirit: false, extra: false });
        if (f.spirit && f.spirit.alive && f.spirit.spd > 0) {
            u.push({ type: 'ally', charId: f.charId, name: f.spirit.name, avatar: 'spirit', spd: f.spirit.spd, av: f.spirit.av || calcActionValue(f.spirit.spd), fighter: f, isSpirit: true, extra: false });
        }
    });
    // 敌人
    G.enemies.forEach(e => {
        if (e.alive) u.push({ type: 'enemy', enemyId: e.id, name: e.name, avatar: 'enemy', spd: e.spd, av: e.av || calcActionValue(e.spd), enemy: e, extra: false });
    });
    // 额外回合（去重处理）
    if (G.extraTurns.length) {
        const seen = new Set();
        G.extraTurns = G.extraTurns.filter(e => {
            const key = e.charId + (e.isSpirit ? '_spirit' : '');
            if (seen.has(key)) return false;
            seen.add(key);
            return e.fighter && e.fighter.alive && (!e.isSpirit || (e.fighter.spirit && e.fighter.spirit.alive));
        });
        G.extraTurns.forEach(e => u.push({ type: 'ally', charId: e.charId, name: e.name + ' ⭐', avatar: e.avatar || 'spirit', spd: 9999, av: 0, fighter: e.fighter, isSpirit: e.isSpirit || false, extra: true }));
        G.extraTurns = [];
    }
    u.sort((a, b) => a.av - b.av);
    G.actionQueue = u;
    G.currentActionIdx = 0;
}

// 推进行动值：当前行动者 AV += 10000/速度，然后重排队列
function advanceActionValue() {
    const cur = G.actionQueue[G.currentActionIdx];
    if (!cur) return;
    if (cur.type === 'ally' && cur.fighter) {
        const spd = cur.isSpirit ? cur.fighter.spirit.spd : cur.fighter.spd;
        cur.av += calcActionValue(spd);
        if (cur.isSpirit && cur.fighter.spirit) cur.fighter.spirit.av = cur.av;
        else cur.fighter.av = cur.av;
    } else if (cur.type === 'enemy' && cur.enemy) {
        cur.av += calcActionValue(cur.enemy.spd);
        cur.enemy.av = cur.av;
    }
    G.actionQueue.sort((a, b) => a.av - b.av);
    const idx = G.actionQueue.findIndex(u => u === cur || (u.type === 'ally' && u.charId === cur.charId && u.isSpirit === cur.isSpirit) || (u.type === 'enemy' && u.enemyId === cur.enemyId));
    G.currentActionIdx = idx !== -1 ? idx : 0;

    // 检查是否进入下一轮
    const topAv = G.actionQueue[0]?.av || 0;
    while (topAv >= G.roundStartAV + G.roundMaxAV) {
        G.roundStartAV += G.roundMaxAV;
        G.round++;
        if (G.round === 1) G.roundMaxAV = 150;
        addLog('系统', `🔄 进入第 ${G.round + 1} 轮！(${G.roundMaxAV}行动值)`, 'special');
    }
}

    else if (skillKey === 'spiritBurst') lb = `💥 选择自爆主目标 (${fighter.name})`;
    else if (skillKey === 'enhancedBasic') lb = `🎯 选择强化普攻主目标 (${fighter.name})`;
    let h = `<span style="color:#aabbdd;font-size:12px;">${lb}</span>`;
    en.forEach(e => {

        const tag = e.type === 'normal' ? '小怪' : '精英怪';

        h += `<button class="btn" data-enemy-id="${e.id}" data-skill="${skillKey}" data-char-id="${fighter.charId}" style="display:flex;flex-direction:column;align-items:flex-start;min-width:140px;padding:4px 10px;">

        </button>`;
    });
    h += `<button class="btn btn-danger" id="btnCancelAction">取消</button>`;
    c.innerHTML = h;

    // 绑定事件
    c.querySelectorAll('button[data-enemy-id]').forEach(btn => {
        btn.addEventListener('click', function() {
            const enemyId = this.getAttribute('data-enemy-id');
            const sk = this.getAttribute('data-skill');
            const charId = this.getAttribute('data-char-id');
            const f = getAllyById(charId);

    let h = `<span class="current-actor-indicator">⚡ 当前行动: ${fighter.name}</span><span style="color:#aabbdd;font-size:12px;margin-left:6px;">选择技能:</span>`;
    const sp = G.sp > 0;
    let ult = fighter.charId === 'xilian' ? (fighter.zhuiYi || 0) >= (G.xilianIsFirstUlt ? 24 : 12) : fighter.energy >= fighter.maxEnergy;
    if (fighter.charId === 'xilian' && G.xilianInPastRipple) {
        h += `<button class="btn btn-primary" id="btnEnhancedBasic">【向着爱与明天♪】</button>`;
        h += `<span style="color:#ffd966;font-size:11px;">🌊 往昔状态</span>`;
        h += `<button class="btn ${ult ? 'btn-warning' : ''}" id="btnXilianUlt" ${ult ? '' : 'disabled'}>⚡【此诗献予一切生命】</button>`;
        c.innerHTML = h;
        document.getElementById('btnEnhancedBasic').addEventListener('click', () => doSkill(fighter.charId, 'enhancedBasic'));
        if (ult) document.getElementById('btnXilianUlt').addEventListener('click', () => doUlt(fighter.charId));
        return;
    }
    h += `<button class="btn" id="btnBasic">【${cd.skills.basic.name}】</button>`;
    if (fighter.charId === 'changye') {
        h += `<button class="btn" id="btnSkill">【${cd.skills.skill.name}】</button>`;
    } else {
        h += `<button class="btn ${sp ? '' : 'btn-danger'}" id="btnSkill" ${sp ? '' : 'disabled'}>【${cd.skills.skill.name}】${sp ? '' : '(SP不足)'}</button>`;
    }
    h += `<button class="btn ${ult ? 'btn-warning' : ''}" id="btnUlt" ${ult ? '' : 'disabled'}>⚡【${cd.skills.ultimate.name}】${ult ? ' (插队)' : ''}</button>`;
    if (fighter.charId === 'changye') { h += `<span style="color:#7aa9ff;font-size:11px;">🌙 忆质: ${fighter.yiZhi || 0}/16</span>`; if ((fighter.yiZhi || 0) >= 16) h += `<span style="color:#ffd966;">🌊已就绪</span>`; }
    if (fighter.charId === 'xilian') { h += `<span style="color:#8899bb;font-size:11px;">📖 追忆: ${fighter.zhuiYi || 0}/27</span>`; }
    if (fighter.charId === 'qingge') h += `<span style="color:#8899bb;font-size:11px;">🌸 叠层: ${G.qinggeTalentStacks}/5</span>`;
    if (fighter.charId === 'fengjin') { if (G.fengjinInRain) h += `<span style="color:#7aa9ff;">🌿雨过天晴</span>`; h += `<span style="color:#8899bb;">💚${G.fengjinCumulativeHeal}</span>`; }
    c.innerHTML = h;

    document.getElementById('btnBasic').addEventListener('click', () => doSkillWithTarget(fighter.charId, 'basic'));
    const skillBtn = document.getElementById('btnSkill');
    if (skillBtn && !skillBtn.disabled) {
        if (fighter.charId === 'changye') {
            skillBtn.addEventListener('click', () => doSkill(fighter.charId, 'skill'));
        } else {
            skillBtn.addEventListener('click', () => doSkill(fighter.charId, 'skill'));
        }
    }
    const ultBtn = document.getElementById('btnUlt');
    if (ultBtn && !ultBtn.disabled) {
        ultBtn.addEventListener('click', () => doUlt(fighter.charId));
    }
}

function doUlt(charId) { if (!G.battleActive) return; const f = getAllyById(charId); if (!f || !f.alive) return; G.ultSelecting = G.ultSelecting || {}; if (G.ultSelecting[charId]) return; if (f.charId === 'xilian') { if ((f.zhuiYi || 0) < (G.xilianIsFirstUlt ? 24 : 12)) { addLog('系统', '❌ 追忆不足'); return; } } else { if (f.energy < f.maxEnergy) { addLog('系统', '❌ 能量不足'); return; } } if (G.isUltInterrupt) { if (!G.pendingUlts.find(u => u.charId === charId)) { G.pendingUlts.push({ charId: charId }); addLog('系统', `⏳ ${f.name} 终结技已排队`, 'special'); } return; } G.isUltInterrupt = true; executeUlt(f); }
function doSkill(charId, skillKey) { if (!G.battleActive) return; const f = getAllyById(charId); if (!f || !f.alive) return; if (skillKey === 'skill') { if (charId !== 'changye' && G.sp <= 0) { addLog('系统', '❌ 战技点不足'); return; } if (charId === 'qingge') { showAllySelection(f, 'skill'); return; } executeSkill(f, 'skill', null); } else if (skillKey === 'enhancedBasic') { executeEnhancedBasic(f); } }
function doSkillWithTarget(charId, skillKey) { const f = getAllyById(charId); if (!f || !f.alive) return; if (skillKey === 'basic') showEnemySelection(f, 'basic'); }

function addYiZhiToChangye(amt, src) { const c = getAllyById('changye'); if (!c || !c.alive) return; c.yiZhi = Math.min((c.yiZhi || 0) + amt, 999); checkChangyeWaterAdvance(c); }
function triggerChangyeTrace1(f, src) { if (f.charId !== 'changye' || !f.alive) return; f.energy = Math.min(f.energy + 5, f.maxEnergy); addYiZhiToChangye(1, `行迹1·${src}`); }
function checkChangyeWaterAdvance(fighter) { if (fighter.charId !== 'changye' || !fighter.alive) return; if ((fighter.yiZhi || 0) >= 16 && G.changyeWaterImmediateReady !== false) { const sp = fighter.spirit; if (sp && sp.alive && sp.spd > 0) { G.waterScheduled = true; } } }
function giveFutureToAllies() { G.fighters.forEach(f => { if (f.alive && f.charId !== 'xilian') { f.futureReady = true; if (f.spirit && f.spirit.alive) f.spirit.hasFuture = true; } }); }
// ★ UI 渲染 ★
function renderAll() { renderRoster(); renderTeam(); renderActionBar(); renderEnemyBar(); renderLog(); updateInfo(); }

function renderRoster() {
    const c = document.getElementById('rosterPanel');
    let h = `<span style="color:#8899bb;font-size:11px;">📋 角色池:</span>`;
    const it = G.team.filter(id => id !== null);
    for (const [id, cd] of Object.entries(CHAR_DATA)) {
        const inT = it.includes(id);
        h += `<div class="roster-item ${inT ? 'in-team' : ''}" onclick="${inT ? '' : 'addToTeam(\'' + id + '\')'}">${cd.short} (${cd.element})${inT ? ' ✅' : ''}${inT ? `<span class="del" onclick="event.stopPropagation();removeFromTeam('${id}')">✕</span>` : ''}</div>`;
    }
    c.innerHTML = h;
}
function addToTeam(charId) { if (G.team.filter(id => id !== null).length >= 4) { alert('队伍已满'); return; } if (G.team.includes(charId)) { alert('已在队伍中'); return; } const idx = G.team.indexOf(null); if (idx === -1) return; G.team[idx] = charId; renderAll(); }
function removeFromTeam(charId) { const idx = G.team.indexOf(charId); if (idx !== -1) { G.team[idx] = null; renderAll(); } }

function renderTeam() {
    const c = document.getElementById('teamPanel'); const cf = getCurrentFighter(); let h = '';
    for (let i = 0; i < 4; i++) {
        const charId = G.team[i];
        if (charId) {
            const cd = CHAR_DATA[charId]; const f = getAllyById(charId);
            const hp = f ? f.hp : (BASE_STATS[charId].baseHp + (G_LC_EQUIPPED[i] ? LIGHTCONE_STATS[charId].hp : 0));
            const mx = f ? f.maxHp : (BASE_STATS[charId].baseHp + (G_LC_EQUIPPED[i] ? LIGHTCONE_STATS[charId].hp : 0));
            const en = f ? f.energy : 0; const alive = f ? f.alive : true;
            const hpPct = mx > 0 ? Math.round(hp / mx * 100) : 0;
            let ult = charId === 'xilian' && f ? (f.zhuiYi || 0) >= (G.xilianIsFirstUlt ? 24 : 12) : en >= cd.maxEnergy;
            const enPct = cd.maxEnergy > 0 ? Math.round(en / cd.maxEnergy * 100) : 0;
            let bt = ''; if (f && f.buffs) for (const [k, v] of Object.entries(f.buffs)) if (v && v.desc) bt += `<span class="buff-tag">${v.desc}</span>`;
            let si = ''; if (f && f.spirit && f.spirit.alive) si = `<div class="spirit-info">🌀 ${f.spirit.name} (${Math.round(f.spirit.hp)}/${Math.round(f.spirit.maxHp)})</div>`;
            let ei = ''; if (charId === 'changye' && f) { ei += `🌙忆质:${f.yiZhi || 0}/16`; if ((f.yiZhi || 0) >= 16) ei += ` 🌊就绪`; if (G.changyeInDarkMystery) ei += ` 🌑至暗(${G.changyeDarkMysteryCharges})`; }
            if (charId === 'xilian' && f) { ei += `📖追忆:${f.zhuiYi || 0}/27`; if (G.xilianInPastRipple) ei += ` 🌊往昔`; }
            if (charId === 'fengjin' && f) { if (G.fengjinInRain) ei += `🌿雨过天晴(${G.fengjinRainDuration})`; ei += ` 💚${G.fengjinCumulativeHeal}`; }
            if (charId === 'qingge' && f) ei += `🌸叠层:${G.qinggeTalentStacks}/5`;
            const isActive = cf && cf.charId === charId && alive && G.battleActive;
            const elementTag = `<span class="corner-tag">${cd.element}·${cd.path}</span>`;
            h += `<div class="char-card has-character${isActive ? ' active-turn' : ''}" style="${!alive ? 'opacity:0.5;' : ''}" onclick="openCharDetail(${i})"><div class="active-turn-tag">⚡ 行动中</div><div class="char-name">${cd.short}</div><div class="stats"><span>❤️${Math.round(hp)}/${Math.round(mx)}</span><span>⚡${Math.round(en)}/${cd.maxEnergy}</span><span>🏃${f ? Math.round(f.spd) : cd.baseSpd}</span></div><div class="hp-bar"><div class="fill" style="width:${hpPct}%;"></div></div><div class="energy-bar"><div class="fill" style="width:${enPct}%;"></div></div><div class="buff-list">${bt}</div>${ult ? `<button class="ult-badge active" onclick="event.stopPropagation();doUlt('${charId}')">⚡</button>` : `<div class="ult-badge" style="opacity:0.2;">⏳</div>`}${!alive ? '<div class="dead">💀 阵亡</div>' : ''}${si}${ei ? `<div style="font-size:8px;color:#aabbdd;margin-top:1px;">${ei}</div>` : ''}${elementTag}</div>`;
        } else h += `<div class="char-card" onclick="openCharDetail(${i})"><div class="empty-slot">⬜ 空位 ${i + 1}</div></div>`;
    }
    c.innerHTML = h;
}

function renderActionBar() {
    const c = document.getElementById('actionBar');
    const q = G.actionQueue || [];
    if (q.length === 0) { c.innerHTML = ''; return; }
    const curAv = q[G.currentActionIdx]?.av || 0;
    const consumed = curAv - G.roundStartAV;
    let h = `<span class="label">⏳ 第${G.round + 1}轮 (${Math.round(consumed)}/${G.roundMaxAV})</span>`;
    const ms = Math.min(q.length, 10);
    for (let i = 0; i < ms; i++) {
        const it = q[i]; if (!it) continue;
        const cur = i === G.currentActionIdx;
        let cls = 'action-slot'; if (cur) cls += ' current'; if (it.extra) cls += ' extra';
        let av = '👤'; if (it.avatar === 'enemy') av = '👹'; else if (it.avatar === 'spirit') av = '🌀'; else if (it.avatar) av = it.avatar.charAt(0);
        const displayAv = cur ? 0 : Math.round(it.av - curAv);
        h += `<div class="${cls}"><span class="avatar ${it.avatar || ''}">${av}</span>${it.name}${cur ? ' ◄' : ''}<span style="font-size:8px;color:#667799;margin-left:2px;">${displayAv}</span></div>`;
    }
    if (q.length > 10) h += `<span style="color:#667799;font-size:10px;">+${q.length - 10}</span>`;
    c.innerHTML = h;
}

function renderEnemyBar() {
    const c = document.getElementById('enemyBar'); let h = '';
    G.enemies.forEach(e => {
        const pct = Math.round(e.hp / e.maxHp * 100);
        const tag = e.type === 'normal' ? '小怪' : '精英怪';
        const tc = e.type === 'normal' ? '#66aa88' : '#ff9966';
        h += `<div class="enemy-item" style="${e.alive ? '' : 'opacity:0.4;'}"><div class="name"><span>${e.alive ? '👹' : '💀'} ${e.name}</span><span class="tag" style="background:${tc};color:#0b0e14;">${tag}</span></div><div class="hp-track"><div class="fill" style="width:${pct}%;"></div><div class="label">${pct}%</div></div><div class="hp-text">❤️ ${Math.round(e.hp)} / ${Math.round(e.maxHp)}</div></div>`;
    });
    if (!G.enemies.length) h = '<span style="color:#667799;">没有敌人</span>';
    c.innerHTML = h;
}

function renderLog() {
    const c = document.getElementById('logContent'); let h = '';
    G.log.slice(-50).forEach(e => { h += `<div class="log-entry"><span class="time">[${e.time}]</span><span class="${e.type}">${e.text}</span></div>`; });
    c.innerHTML = h;
    const p = document.getElementById('logPanel'); if (p) p.scrollTop = p.scrollHeight;
}
function updateInfo() {
    document.getElementById('roundDisplay').textContent = G.round + 1;
    document.getElementById('spDisplay').textContent = G.sp;
    document.getElementById('targetDisplay').textContent = getAliveEnemies().length + '个敌人';
}

function resetBattle() {
    G.battleActive = false; G.battleStarted = false; G.fighters = []; G.enemies = []; G.actionQueue = []; G.log = [];
    G.round = 0; G.roundMaxAV = 300; G.roundStartAV = 0; G.sp = 3; G.fieldEffects = {}; G.extraTurns = [];
    G.fengjinCumulativeHeal = 0; G.fengjinInRain = false; G.fengjinRainDuration = 0;
    G.fengjinIsFirstSummon = true; G.fengjinSpiritDmgStacks = 0; G.fengjinLightConeDrainTotal = 0;
    G.changyeInDarkMystery = false; G.changyeDarkMysteryCharges = 0; G.changyeWaterImmediateReady = true;
    G.xilianInPastRipple = false; G.xilianIsFirstUlt = true; G.xilianStory = 0; G.xilianSkyStacks = 0;
    G.currentActionIdx = 0; G.processing = false; G.isUltInterrupt = false; G.isSpiritTurn = false;
    G.qinggeTalentStacks = 0; G.lastActorName = null; G.waterAdvanceLock = false;
    G.ultHpApplied = { qingge: false, fengjin: false };
    document.getElementById('app').classList.add('pre-battle');
    document.getElementById('app').classList.remove('in-battle');
    document.getElementById('skillButtons').innerHTML = '<span style="color:#667799;">等待行动...</span>';
    addLog('系统', '🔄 已重置'); renderAll();
}
// ★ 角色详情弹窗 ★
let currentDetailCharId = null, currentDetailSlotIdx = -1, showingSpirit = false;
function openCharDetail(slotIdx) {
    currentDetailSlotIdx = slotIdx; showingSpirit = false;
    const charId = G.team[slotIdx]; if (!charId) return;
    currentDetailCharId = charId;
    renderDetailModal();
    document.getElementById('charDetailOverlay').classList.add('show');
}
function closeCharDetail() { document.getElementById('charDetailOverlay').classList.remove('show'); }
function toggleDetailSpirit() { showingSpirit = !showingSpirit; renderDetailModal(); }
function renderDetailModal() {
    const slotIdx = currentDetailSlotIdx; const charId = currentDetailCharId;
    if (!charId) return;
    const modal = document.getElementById('charDetailModal');
    const cd = CHAR_DATA[charId];
    const bs = getCharBaseStats(charId, slotIdx);
    const equipped = G_LC_EQUIPPED[slotIdx];
    const lc = LIGHTCONE_STATS[charId];
    const f = G.battleActive ? getAllyById(charId) : null;
    let title = cd.name;
    let hp, mx, atk, def, spd, cr, cdmg, elemDmg;
    if (showingSpirit && f && f.spirit && f.spirit.alive) {
        title = f.spirit.name;
        hp = f.spirit.hp; mx = f.spirit.maxHp; spd = f.spirit.spd;
        atk = '-'; def = '-';
        let critRate = f.critRate; let critDmg = f.critDmg;
        if (f.buffs && f.buffs.changyeSkill && f.buffs.changyeSkill.critDmgBonus) critDmg += f.buffs.changyeSkill.critDmgBonus;
        cr = Math.round(critRate * 100) + '%'; cdmg = Math.round(critDmg * 100) + '%';
        elemDmg = { ice: cd.element === '冰' ? 40 : 0, wind: cd.element === '风' ? 40 : 0, other: 0 };
    } else {
        hp = f ? f.hp : bs.baseHp; mx = f ? f.maxHp : bs.baseHp;
        spd = f ? f.spd : bs.baseSpd;
        cr = f ? Math.round(f.critRate * 100) + '%' : Math.round(bs.baseCritRate * 100) + '%';
        cdmg = f ? Math.round(f.critDmg * 100) + '%' : Math.round(bs.baseCritDmg * 100) + '%';
        atk = f ? Math.round(f.atk) : bs.baseAtk; def = f ? Math.round(f.def) : bs.baseDef;
        elemDmg = { ice: 0, wind: 0, other: 0 };
    }
    let h = `
        <h2>${title} <span style="font-size:12px;color:#8899bb;">${cd.element}·${cd.path}</span></h2>
        <div class="detail-row"><span class="label">生命值</span><span class="value">${Math.round(hp)} / ${Math.round(mx)}</span></div>
        <div class="detail-row"><span class="label">攻击力</span><span class="value">${atk}</span></div>
        <div class="detail-row"><span class="label">防御力</span><span class="value">${def}</span></div>
        <div class="detail-row"><span class="label">速度</span><span class="value">${Math.round(spd)}</span></div>
        <div class="detail-row"><span class="label">暴击率</span><span class="value">${cr}</span></div>
        <div class="detail-row"><span class="label">暴击伤害</span><span class="value">${cdmg}</span></div>
        <div class="section-title">元素伤害加成</div>
        <div class="detail-row"><span class="label">冰属性</span><span class="value">${elemDmg.ice}%</span></div>
        <div class="detail-row"><span class="label">风属性</span><span class="value">${elemDmg.wind}%</span></div>
        <div class="detail-row"><span class="label">其他属性</span><span class="value">${elemDmg.other}%</span></div>
        ${!showingSpirit ? `<div class="section-title">光锥: ${equipped ? '已装备' : '未装备'}</div>` : ''}
    `;
    if (!G.battleActive && !showingSpirit) {
        h += `
        <div class="lc-toggle">
            <label><input type="checkbox" ${equipped ? 'checked' : ''} onchange="toggleLightCone(${slotIdx},this.checked)"> 佩戴光锥</label>
            <span style="color:#8899bb;font-size:11px;">生命+${lc.hp} 攻击+${lc.atk} 防御+${lc.def}</span>
        </div>`;
    }
    if (f && f.spirit && f.spirit.alive) {
        h += `<button class="switch-btn" onclick="toggleDetailSpirit()">切换到 ${showingSpirit ? cd.name : f.spirit.name}</button>`;
    }
    h += `<button class="btn btn-danger close-btn" onclick="closeCharDetail()">关闭</button>`;
    modal.innerHTML = h;
}
function toggleLightCone(slotIdx, checked) { G_LC_EQUIPPED[slotIdx] = checked; renderAll(); }

// 初始化
renderAll();
addLog('系统', '💡 点击角色池加入编队 (4人), 然后「开始战斗」');
addLog('系统', '📌 点击角色卡片可查看详情并调整光锥');

// 全局绑定
window.addToTeam = addToTeam; window.removeFromTeam = removeFromTeam;
window.startBattle = startBattle; window.resetBattle = resetBattle;
window.doSkill = doSkill; window.doUlt = doUlt;
window.doSkillWithTarget = doSkillWithTarget; window.executeTargetAction = executeTargetAction;
window.cancelAction = cancelAction;
window.xilianUltChoice = xilianUltChoice; window.xilianApplyBuff = xilianApplyBuff;
window.executeSkillWithTarget = executeSkillWithTarget;
window.openCharDetail = openCharDetail; window.closeCharDetail = closeCharDetail;
window.toggleLightCone = toggleLightCone;

</script>
</body>
</html>
